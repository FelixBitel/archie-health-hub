<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archie Health Hub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { background: rgba(255,255,255,0.95); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        nav h1 { font-size: 1.5rem; color: #667eea; }
        nav a { margin: 0 10px; text-decoration: none; color: #333; font-weight: 500; transition: color 0.3s; }
        nav a:hover, nav a.active { color: #667eea; }
        .card { background: white; border-radius: 10px; padding: 2rem; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .btn { background: #667eea; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: all 0.3s; }
        .btn:hover { background: #5568d3; transform: translateY(-2px); }
        input, select, textarea { width: 100%; padding: 10px; margin: 8px 0; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 10px; text-align: center; }
        #content { display: none; }
        #content.active { display: block; }
        .hidden { display: none; }
        .log-item { padding: 15px; margin: 10px 0; background: #f5f5f5; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container">
        <nav id="nav" class="hidden">
            <h1>🐕 Archie Health Hub</h1>
            <div>
                <a href="#dashboard" onclick="router('dashboard')">Dashboard</a>
                <a href="#health" onclick="router('health')">Health</a>
                <a href="#tasks" onclick="router('tasks')">Tasks</a>
                <a href="#ai" onclick="router('ai')">AI Assistant</a>
                <a href="#" onclick="logout()">Logout</a>
            </div>
        </nav>
        <div id="auth" class="card">
            <h2 style="margin-bottom:20px;">🐾 Login to Archie Health Hub</h2>
            <input type="email" id="email" placeholder="Email" value="test@example.com">
            <input type="password" id="password" placeholder="Password" value="password123">
            <button class="btn" onclick="login()" style="width:100%;margin-top:10px;">Login</button>
            <p style="text-align:center;margin-top:10px;color:#666;">Demo credentials pre-filled</p>
        </div>
        <div id="content"></div>
    </div>
    <script>
        let currentUser = null;
        let healthLogs = JSON.parse(localStorage.getItem('healthLogs') || '[]');
        let tasks = JSON.parse(localStorage.getItem('tasks') || '[{"title":"Feed Archie","time":"8:00 AM","done":true},{"title":"Walk","time":"6:00 PM","done":false}]');
        
        function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            currentUser = { email, token: 'demo-token-' + Date.now() };
            localStorage.setItem('user', JSON.stringify(currentUser));
            document.getElementById('auth').classList.add('hidden');
            document.getElementById('nav').classList.remove('hidden');
            router('dashboard');
        }
        
        function logout() {
            currentUser = null;
            localStorage.removeItem('user');
            document.getElementById('auth').classList.remove('hidden');
            document.getElementById('nav').classList.add('hidden');
            document.getElementById('content').innerHTML = '';
            document.getElementById('content').classList.remove('active');
        }
        
        function router(page) {
            const content = document.getElementById('content');
            content.classList.add('active');
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
            document.querySelector(`nav a[href="#${page}"]`)?.classList.add('active');
            
            switch(page) {
                case 'dashboard':
                    content.innerHTML = `
                        <div class="card">
                            <h2 style="margin-bottom:20px;">📊 Dashboard</h2>
                            <div class="grid">
                                <div class="stat-card">
                                    <h3>Weight</h3>
                                    <p style="font-size:2rem;margin-top:10px;">25.3 kg</p>
                                    <p style="opacity:0.8;">Last: 25.1 kg</p>
                                </div>
                                <div class="stat-card">
                                    <h3>Activity</h3>
                                    <p style="font-size:2rem;margin-top:10px;">⬆️ High</p>
                                    <p style="opacity:0.8;">3 walks today</p>
                                </div>
                                <div class="stat-card">
                                    <h3>Pending Tasks</h3>
                                    <p style="font-size:2rem;margin-top:10px;">${tasks.filter(t => !t.done).length}</p>
                                    <p style="opacity:0.8;">Total: ${tasks.length}</p>
                                </div>
                                <div class="stat-card">
                                    <h3>Health Logs</h3>
                                    <p style="font-size:2rem;margin-top:10px;">${healthLogs.length}</p>
                                    <p style="opacity:0.8;">This month</p>
                                </div>
                            </div>
                        </div>`;
                    break;
                    
                case 'health':
                    const logsHtml = healthLogs.map((log, i) => `
                        <div class="log-item">
                            <strong>${log.type}</strong> - ${log.value} ${log.unit || ''}<br>
                            <small style="color:#666;">${log.date}</small>
                        </div>`).join('') || '<p style="color:#666;">No health logs yet. Add your first log!</p>';
                    
                    content.innerHTML = `
                        <div class="card">
                            <h2>🏥 Health Logs</h2>
                            <div style="margin-top:20px;">
                                <select id="logType">
                                    <option>Weight</option>
                                    <option>Temperature</option>
                                    <option>Medication</option>
                                    <option>Vet Visit</option>
                                </select>
                                <input type="text" id="logValue" placeholder="Value (e.g., 25.5)">
                                <input type="text" id="logUnit" placeholder="Unit (e.g., kg)">
                                <button class="btn" onclick="addHealthLog()" style="width:100%;">Add Log</button>
                            </div>
                            <div style="margin-top:30px;">${logsHtml}</div>
                        </div>`;
                    break;
                    
                case 'tasks':
                    const tasksHtml = tasks.map((task, i) => `
                        <div class="log-item" style="display:flex;justify-content:space-between;align-items:center;">
                            <div>
                                <strong style="${task.done ? 'text-decoration:line-through;opacity:0.6;' : ''}">${task.title}</strong><br>
                                <small style="color:#666;">${task.time}</small>
                            </div>
                            <button class="btn" onclick="toggleTask(${i})" style="padding:8px 16px;">
                                ${task.done ? '↩️ Undo' : '✔️ Done'}
                            </button>
                        </div>`).join('');
                    
                    content.innerHTML = `
                        <div class="card">
                            <h2>📝 Tasks</h2>
                            <div style="margin-top:20px;">
                                <input type="text" id="taskTitle" placeholder="Task title">
                                <input type="time" id="taskTime" value="08:00">
                                <button class="btn" onclick="addTask()" style="width:100%;">Add Task</button>
                            </div>
                            <div style="margin-top:30px;">${tasksHtml}</div>
                        </div>`;
                    break;
                    
                case 'ai':
                    content.innerHTML = `
                        <div class="card">
                            <h2>🤖 AI Assistant</h2>
                            <div style="margin-top:20px;">
                                <label style="display:block;margin-bottom:5px;font-weight:500;">AI Provider:</label>
                                <select id="provider">
                                    <option value="openrouter">OpenRouter</option>
                                    <option value="perplexity">Perplexity</option>
                                    <option value="anthropic">Anthropic (Claude)</option>
                                    <option value="openai">OpenAI</option>
                                </select>
                                <label style="display:block;margin:15px 0 5px;font-weight:500;">Your Question:</label>
                                <textarea id="prompt" rows="4" placeholder="Ask about your pet's health, nutrition, or behavior..."></textarea>
                                <button class="btn" onclick="askAI()" style="width:100%;margin-top:10px;">Ask AI</button>
                                <div id="ai-response" style="margin-top:20px;padding:15px;background:#f5f5f5;border-radius:8px;display:none;"></div>
                            </div>
                        </div>`;
                    break;
            }
        }
        
        function addHealthLog() {
            const type = document.getElementById('logType').value;
            const value = document.getElementById('logValue').value;
            const unit = document.getElementById('logUnit').value;
            if(!value) { alert('Please enter a value'); return; }
            
            healthLogs.unshift({ type, value, unit, date: new Date().toLocaleString() });
            localStorage.setItem('healthLogs', JSON.stringify(healthLogs));
            router('health');
        }
        
        function addTask() {
            const title = document.getElementById('taskTitle').value;
            const time = document.getElementById('taskTime').value;
            if(!title) { alert('Please enter a task title'); return; }
            
            tasks.push({ title, time, done: false });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            router('tasks');
        }
        
        function toggleTask(index) {
            tasks[index].done = !tasks[index].done;
            localStorage.setItem('tasks', JSON.stringify(tasks));
            router('tasks');
        }
        
        function askAI() {
            const provider = document.getElementById('provider').value;
            const prompt = document.getElementById('prompt').value;
            if(!prompt) { alert('Please enter a question'); return; }
            
            const responseDiv = document.getElementById('ai-response');
            responseDiv.style.display = 'block';
            responseDiv.innerHTML = `
                <p style="color:#667eea;margin-bottom:10px;"><strong>🤖 ${provider.charAt(0).toUpperCase() + provider.slice(1)}:</strong></p>
                <p>This is a demo response. To get real AI responses, connect to your backend API at:</p>
                <code style="display:block;background:#fff;padding:10px;border-radius:5px;margin:10px 0;">POST /api/ai/chat</code>
                <p style="margin-top:10px;"><strong>Your question:</strong> "${prompt}"</p>
                <p style="margin-top:10px;color:#666;">Configure your ${provider} API key in the backend to enable real responses.</p>
            `;
        }
        
        window.onload = () => {
            const user = localStorage.getItem('user');
            if(user) {
                currentUser = JSON.parse(user);
                document.getElementById('auth').classList.add('hidden');
                document.getElementById('nav').classList.remove('hidden');
                router('dashboard');
            }
        };
    </script>
</body>
</html>
